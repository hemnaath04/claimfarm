name: Build and push container image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "data/eval/README.md"
      - "deploy/fc-env-vars.txt"
  workflow_dispatch:

env:
  ACR_REGISTRY: claimfarm-acr-registry.ap-southeast-1.cr.aliyuncs.com
  ACR_IMAGE: claimfarm-hb/claimfarm
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/claimfarm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to both registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tell Function Compute 3.0 to pull the new image by its immutable
  # per-commit digest. No-ops (exit 0) until the FC secrets are configured.
  deploy-fc:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FC SDK
        run: pip install --quiet alibabacloud_fc20230330 alibabacloud_tea_openapi

      - name: Update FC function image
        env:
          # Accept the dedicated FC_* names or the shared ALIBABA_ACCESS_KEY_*
          # secrets (same claimfarm-app RAM key, reused), from Secrets or Vars.
          ALIBABA_FC_ACCESS_KEY_ID: ${{ secrets.ALIBABA_FC_ACCESS_KEY_ID || secrets.ALIBABA_ACCESS_KEY_ID || vars.ALIBABA_FC_ACCESS_KEY_ID }}
          ALIBABA_FC_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_FC_ACCESS_KEY_SECRET || secrets.ALIBABA_ACCESS_KEY_SECRET || vars.ALIBABA_FC_ACCESS_KEY_SECRET }}
          FC_ACCOUNT_ID: ${{ vars.FC_ACCOUNT_ID || secrets.FC_ACCOUNT_ID }}
          FC_REGION: ${{ vars.FC_REGION || secrets.FC_REGION || 'ap-southeast-1' }}
          FC_FUNCTION_NAME: ${{ vars.FC_FUNCTION_NAME || secrets.FC_FUNCTION_NAME || 'claimfarm-api' }}
          FC_IMAGE: ${{ env.GHCR_IMAGE }}:${{ github.sha }}
        run: python deploy/fc_update_image.py
