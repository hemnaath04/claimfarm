name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + type + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Compile-check (catches import + syntax issues fast)
        run: uv run python -m compileall -q app mock_insurer scripts

      - name: Ruff lint
        # SEC-009: blocking — ruff errors must be fixed before merge.
        run: uv run ruff check app mock_insurer scripts

      - name: Pytest
        run: uv run pytest -q
        # Keep the baseline green; add || true only per-test in exceptional
        # cases tracked in a PR comment, not blanket here.
        env:
          QWEN_API_KEY: "test"
          PYTHONHASHSEED: "0"

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack + pnpm
        run: corepack enable

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
